<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOMUTY</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #030508;
            color: #f0f2f5;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020305;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ЭКРАН ЗАГРУЗКИ ПРИЛОЖЕНИЯ */
        .app-splash-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020305;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
        }
        .splash-icon-preview {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            background: #0b1329;
            border: 2px solid #38bdf8;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.5);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .splash-icon-preview canvas {
            width: 100%;
            height: 100%;
        }
        .splash-title {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.4));
        }
        .splash-progress-bg {
            width: 240px;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
        }
        .splash-progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            box-shadow: 0 0 12px #38bdf8;
            transition: width 0.02s linear;
        }

        /* ПОПАП УСПЕШНОЙ ПОКУПКИ ИЛИ ПОЛУЧЕНИЯ НАГРАДЫ */
        .purchase-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 3, 5, 0.75);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 120;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .purchase-modal.active {
            opacity: 1;
        }
        .purchase-box {
            background: linear-gradient(135deg, #0b1329, #172554);
            border: 2px solid #38bdf8;
            border-radius: 30px;
            padding: 30px 25px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.6);
display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .purchase-modal.active .purchase-box {
            transform: scale(1);
        }
        .purchase-icon-preview {
            width: 75px;
            height: 75px;
            background: #020305;
            border-radius: 20px;
            border: 1px solid #38bdf8;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            font-size: 32px;
        }
        .purchase-box h3 {
            font-size: 20px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
        }
        .purchase-box p {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        /* МИНИ-ОКНО ЗАГРУЗКИ ТОЛЬКО ДЛЯ КАЛЕНДАРЯ */
        .screen-loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 5, 8, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 110;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .screen-loader-overlay.active {
            opacity: 1;
        }
        .screen-loader-spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(56, 189, 248, 0.2);
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        .screen-loader-text {
            font-size: 13px;
            font-weight: 800;
            color: #38bdf8;
            letter-spacing: 2px;
        }

        .ui-overlay {
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #64748b;
            z-index: 5;
            display: none;
        }
        .ui-overlay span {
            color: #38bdf8;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.9);
        }

        .game-toast {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(11, 19, 41, 0.92);
            border: 1px solid #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
            backdrop-filter: blur(10px);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1px;
            z-index: 30;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
            text-align: center;
            max-width: 85%;
            white-space: nowrap;
        }
        .game-toast.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 5, 8, 0.88);
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 40;
        }
        .loading-box {
            background: #0b1329;
            border: 1px solid #38bdf8;
padding: 25px 35px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .loading-text {
            font-size: 15px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 1px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(56, 189, 248, 0.2);
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-arrow-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            color: #ffffff;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        .back-arrow-btn:active {
            transform: scale(0.9);
            background: #38bdf8;
            color: #030508;
        }

        .calendar-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: rgba(11, 19, 41, 0.85);
            border: 2px solid #ec4899;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
            backdrop-filter: blur(8px);
            transition: transform 0.2s ease;
        }
        .calendar-btn:active {
            transform: scale(0.92);
        }
        .cal-grid-icon {
            width: 22px;
            height: 18px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
        }
        .cal-cell {
            background: #ec4899;
            border-radius: 2px;
        }
        .cal-badge {
            font-size: 9px;
            font-weight: 900;
            color: #ffffff;
            margin-top: 3px;
        }

        /* КАЛЕНДАРЬ НАГРАД (20 ДНЕЙ) */
        .calendar-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0b1329 0%, #030508 100%);
            backdrop-filter: blur(18px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 25;
            padding: 25px 15px;
            overflow-y: auto;
            touch-action: pan-y;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .calendar-screen.active {
            opacity: 1;
            transform: scale(1);
        }
        .calendar-screen h2 {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, #f472b6, #c084fc, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            margin-top: 10px;
            letter-spacing: 2px;
            text-align: center;
            filter: drop-shadow(0 0 15px rgba(244, 114, 182, 0.4));
        }
.calendar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 440px;
            margin-top: 15px;
            margin-bottom: 30px;
        }
        .cal-item {
            aspect-ratio: 0.82;
            background: rgba(11, 19, 41, 0.65);
            border: 2px solid rgba(56, 189, 248, 0.25);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px 6px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .cal-item:active {
            transform: scale(0.94);
        }
        .cal-item.ready {
            border-color: #38bdf8;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.7);
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(99, 102, 241, 0.3));
            animation: pulseCard 1.5s infinite alternate;
        }
        @keyframes pulseCard {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(56, 189, 248, 0.5); }
            100% { transform: scale(1.05); box-shadow: 0 0 30px rgba(56, 189, 248, 0.85); }
        }
        .cal-item.claimed {
            opacity: 0.65;
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.12);
            cursor: default;
        }
        .cal-item.locked {
            opacity: 0.35;
            cursor: not-allowed;
            filter: grayscale(0.8);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .cal-item.megapack-day {
            grid-column: span 4;
            aspect-ratio: 2.8;
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.3), rgba(168, 85, 247, 0.4), rgba(56, 189, 248, 0.3));
            border: 2px solid #ec4899;
            box-shadow: 0 0 35px rgba(236, 72, 153, 0.6);
            flex-direction: row;
            padding: 15px 20px;
            align-items: center;
        }
        .cal-item.megapack-day.ready {
            animation: pulseMega 1.5s infinite alternate;
        }
        @keyframes pulseMega {
            0% { transform: scale(1); box-shadow: 0 0 25px rgba(236, 72, 153, 0.6); }
            100% { transform: scale(1.03); box-shadow: 0 0 45px rgba(236, 72, 153, 0.9); }
        }
        .cal-day-num {
            font-size: 11px;
            font-weight: 900;
            color: #94a3b8;
            align-self: flex-start;
        }
        .cal-item.ready .cal-day-num { color: #38bdf8; }
        .cal-item.claimed .cal-day-num { color: #10b981; }
        .cal-item.megapack-day .cal-day-num { align-self: flex-start; font-size: 13px; color: #f472b6; }
        
        .cal-item-icon {
            font-size: 26px;
            margin: auto 0;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
            animation: floatIcon 2.5s ease-in-out infinite alternate;
        }
        @keyframes floatIcon {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); }
        }
        .megapack-day .cal-item-icon {
            font-size: 44px;
            margin: 0 20px;
        }
        .megapack-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            flex-grow: 1;
        }
        .cal-item-desc {
            font-size: 10px;
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .cal-item.claimed .cal-item-desc {
            color: #34d399;
            font-size: 11px;
        }
        .megapack-info .cal-item-desc {
            font-size: 15px;
            background: linear-gradient(135deg, #f472b6, #fbbf24);
-webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 2px;
        }

        /* ГЛАВНОЕ МЕНЮ */
        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 5, 8, 0.35);
            backdrop-filter: blur(3px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .menu-screen h1 {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc, #ec4899);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientAnim 4s ease infinite;
            margin-bottom: 20px;
            letter-spacing: 5px;
            filter: drop-shadow(0 0 25px rgba(56, 189, 248, 0.8));
        }

        @keyframes gradientAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .wallet-display {
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.4);
            padding: 8px 22px;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 800;
            color: #fbbf24;
            margin-bottom: 25px;
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(8px);
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 250px;
        }

        .btn {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: #030508;
            border: none;
            padding: 15px 20px;
            font-size: 15px;
            font-weight: 900;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
            box-shadow: 0 5px 25px rgba(56, 189, 248, 0.5);
            letter-spacing: 1.5px;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-secondary {
            background: rgba(11, 19, 41, 0.65);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        /* ОКНО ИТОГОВ ИГРЫ */
        .results-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 3, 5, 0.88);
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .results-box {
            background: #0b1329;
            border: 2px solid #38bdf8;
            border-radius: 28px;
            padding: 30px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.4);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .results-title {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .results-stat-row {
            display: flex;
justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 18px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 15px;
        }
        .results-stat-val {
            color: #38bdf8;
            font-size: 18px;
        }
        .coins-earned-val {
            color: #fbbf24;
        }

        .sub-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 5, 8, 0.92);
            backdrop-filter: blur(18px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 15;
            padding: 25px 20px;
            overflow-y: auto;
            touch-action: pan-y;
        }
        .sub-screen h2 {
            font-size: 26px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 12px;
            margin-top: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
        
        .shop-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #94a3b8;
            padding: 9px 22px;
            border-radius: 18px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
        }
        .tab-btn.active {
            background: #38bdf8;
            color: #030508;
            border-color: #38bdf8;
        }

        .shop-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 380px;
            margin-bottom: 25px;
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
        }

        .preview-box {
            width: 60px;
            height: 60px;
            background: #020305;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .preview-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .shop-item-info {
            flex-grow: 1;
            text-align: left;
        }
        .shop-item-info h4 {
            font-size: 15px;
            color: #fff;
            margin-bottom: 3px;
            font-weight: 700;
        }
        .shop-item-info p {
            font-size: 11px;
            color: #94a3b8;
            margin: 0;
        }

        .item-action-btn {
            background: #38bdf8;
            color: #030508;
            border: none;
            padding: 9px 14px;
            font-size: 11px;
            font-weight: 900;
            border-radius: 14px;
            cursor: pointer;
        }
        .item-action-btn.equipped {
            background: rgba(255, 255, 255, 0.08);
            color: #64748b;
            cursor: default;
        }
        .item-action-btn.purchased {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            color: #34d399;
            cursor: default;
        }
        .item-action-btn.buy {
            background: #fbbf24;
            color: #030508;
        }

        .setting-item {
margin-bottom: 16px;
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
        }
        .setting-item label {
            font-size: 13px;
            color: #94a3b8;
        }
        #musicFileInput {
            display: none;
        }
    </style>
</head>
<body>

    <input type="file" id="musicFileInput" accept="audio/*">
    <audio id="customAudio" crossorigin="anonymous" loop></audio>

    <div class="game-container">
        <!-- ЭКРАН ЗАГРУЗКИ ПРИЛОЖЕНИЯ -->
        <div class="app-splash-screen" id="appSplashScreen">
            <div class="splash-icon-preview">
                <canvas id="splashCanvas" width="90" height="90"></canvas>
            </div>
            <div class="splash-title">HOMUTY</div>
            <div class="splash-progress-bg">

        function renderSplashIconAnimation() {
            splashAnimFrame++;
            sCtx.clearRect(0, 0, 90, 90);
            sCtx.save();
            sCtx.translate(45, 45);

            let hover = Math.sin(splashAnimFrame * 0.1) * 3;
            sCtx.translate(0, hover);

            sCtx.fillStyle = '#38bdf8';
            sCtx.beginPath();
            sCtx.ellipse(0, 6, 26, 11, 0, 0, Math.PI * 2);
            sCtx.fill();
            sCtx.strokeStyle = '#ffffff';
            sCtx.lineWidth = 1.5;
            sCtx.stroke();

            sCtx.fillStyle = '#0284c7';
            sCtx.beginPath();
            sCtx.ellipse(3, 13, 8, 16, -Math.PI / 4, 0, Math.PI * 2);
            sCtx.fill();
            sCtx.stroke();

            sCtx.fillStyle = '#1e293b';
            sCtx.beginPath();
            sCtx.arc(-2, -7, 12, 0, Math.PI * 2);
            sCtx.fill();

            sCtx.fillStyle = '#ffffff';
            sCtx.beginPath();
            sCtx.arc(-1, -5, 8.5, 0, Math.PI * 2);
            sCtx.fill();

            sCtx.fillStyle = '#ffffff';
            sCtx.beginPath();
            sCtx.arc(3, -11, 3.5, 0, Math.PI * 2);
            sCtx.fill();
            sCtx.fillStyle = '#000000';
            sCtx.beginPath();
            sCtx.arc(4, -11, 1.4, 0, Math.PI * 2);
            sCtx.fill();

            sCtx.fillStyle = '#f97316';
            sCtx.beginPath();
            sCtx.moveTo(6, -8);
            sCtx.lineTo(13, -7);
            sCtx.lineTo(6, -5);
            sCtx.fill();

            sCtx.strokeStyle = '#cbd5e1';
            sCtx.lineWidth = 3.5;
            sCtx.beginPath();
            let pSpread = (splashAnimFrame % 6 < 3) ? 16 : 6;
            sCtx.moveTo(26, 6 - pSpread);
            sCtx.lineTo(26, 6 + pSpread);
            sCtx.stroke();

            sCtx.restore();
            requestAnimationFrame(renderSplashIconAnimation);
}

        function drawPenguinInPlane(renderCtx, skinId, fCount, primaryColor, tiltAngle = 0) {
            renderCtx.save();
            renderCtx.rotate(tiltAngle);
            
            let planeColor = primaryColor;
            let penguinBody = '#1e293b';
            let penguinBelly = '#ffffff';
            let beakColor = '#f97316';
            
            if (skinId === 'void') {
                planeColor = '#333333';
                penguinBody = '#000000';
                beakColor = '#555555';
            } else if (skinId === 'gold' || skinId === 'cal_mega_king') {
                planeColor = skinId === 'cal_mega_king' ? '#ff00ea' : '#ffd700';
                penguinBody = skinId === 'cal_mega_king' ? '#7c3aed' : '#b8860b';
                beakColor = skinId === 'cal_mega_king' ? '#00ffff' : '#ffffff';
            }

            renderCtx.scale(1.3, 1.3);

            renderCtx.fillStyle = planeColor;
            renderCtx.beginPath();
            renderCtx.ellipse(-16, -2, 5, 10, -Math.PI / 6, 0, Math.PI * 2);
            renderCtx.fill();

            renderCtx.fillStyle = penguinBody;
            renderCtx.beginPath();
            renderCtx.arc(-2, -7, 11, 0, Math.PI * 2);
            renderCtx.fill();
            
            renderCtx.fillStyle = penguinBelly;
            renderCtx.beginPath();
            renderCtx.arc(-1, -5, 7.5, 0, Math.PI * 2);
            renderCtx.fill();
            
            if (skinId === 'eyes' || skinId === 'cal_mega_king' || skinId === 'cal_cyber_pilot') {
                renderCtx.fillStyle = skinId === 'cal_mega_king' ? '#00ffff' : '#333';
                renderCtx.beginPath();
                renderCtx.arc(3, -11, 4.5, 0, Math.PI * 2);
                renderCtx.fill();
                renderCtx.strokeStyle = '#fff';
                renderCtx.lineWidth = 1.2;
                renderCtx.stroke();
            } else {
                renderCtx.fillStyle = '#fff';
                renderCtx.beginPath();
                renderCtx.arc(3, -11, 3, 0, Math.PI * 2);
                renderCtx.fill();
                renderCtx.fillStyle = '#000';
                renderCtx.beginPath();
                renderCtx.arc(4, -11, 1.2, 0, Math.PI * 2);
                renderCtx.fill();
            }
            
            renderCtx.fillStyle = beakColor;
            renderCtx.beginPath();
            renderCtx.moveTo(5, -8);
            renderCtx.lineTo(11, -7);
            renderCtx.lineTo(5, -5);
            renderCtx.fill();

            renderCtx.fillStyle = planeColor;
            renderCtx.beginPath();
            renderCtx.ellipse(0, 6, 21, 9, 0, 0, Math.PI * 2);
            renderCtx.fill();
            renderCtx.strokeStyle = 'rgba(255,255,255,0.4)';
            renderCtx.lineWidth = 1.2;
            renderCtx.stroke();

            renderCtx.fillStyle = planeColor;
            renderCtx.beginPath();
            renderCtx.ellipse(2, 11, 7, 14, -Math.PI / 4, 0, Math.PI * 2);
            renderCtx.fill();
            renderCtx.stroke();

            renderCtx.strokeStyle = '#cbd5e1';
            renderCtx.lineWidth = 3;
            renderCtx.beginPath();
            let propSpread = (fCount % 6 < 3) ? 14 : 5;
            renderCtx.moveTo(21, 6 - propSpread);
            renderCtx.lineTo(21, 6 + propSpread);
            renderCtx.stroke();
            
            if (skinId === 'plasma' || skinId === 'cal_mega_king') {
renderCtx.strokeStyle = skinId === 'cal_mega_king' ? '#00ffff' : '#ffffff';
                renderCtx.lineWidth = 1.8;
                renderCtx.beginPath();
                renderCtx.moveTo(-22, 6);
                renderCtx.lineTo(-30 + Math.random() * 6, 2 + Math.random() * 8);
                renderCtx.stroke();
            }

            renderCtx.restore();
        }

            const pCanvas = document.getElementById(`preview_skin_${skinId}`);

            pCanvas.width = 60;

            const pCtx = pCanvas.getContext('2d');

            let color = '#38bdf8';

            else if (skinId === 'gold') color = '#ffd700';
            else if (skinId === 'void') color = '#a855f7';

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
function setupCustomAudioNode() {
            if (!audioCtx) initAudio();
            if (customAudio && !sourceNode) {
                try {
                    sourceNode = audioCtx.createMediaElementSource(customAudio);
                    sourceNode.connect(analyser);
                    analyser.connect(audioCtx.destination);
                } catch(e) {}
            }
        }

        function startMelodyEngine() {
            stopMusicEngine();
            if (!musicEnabled) return;
            initAudio();
            if (useCustomMusic) {
                setupCustomAudioNode();
                customAudio.currentTime = 0;
                customAudio.volume = 1.0;
                customAudio.play().catch(e => console.log(e));
                return;
            }

            const scales = [
                [220, 246.94, 261.63, 329.63, 392, 440],
                [174.61, 196, 220, 261.63, 293.66],
                [196, 220, 246.94, 293.66, 329.63]
            ];
            const bassScales = [110, 87.31, 98, 130.81];

            let currentScale = scales[0];
            let beatStep = 0;

            melodyTimer = setInterval(() => {
                if (!audioCtx || !musicEnabled) return;
                let time = audioCtx.currentTime;

                if (beatStep % 16 === 0) {
                    currentScale = scales[Math.floor(Math.random() * scales.length)];
                }

                let bassNote = bassScales[Math.floor(beatStep / 8) % bassScales.length];
                let leadNote = currentScale[Math.floor(Math.random() * currentScale.length)];

                let bassOsc = audioCtx.createOscillator();
                let bassGain = audioCtx.createGain();
                bassOsc.type = 'sine';
                bassOsc.frequency.setValueAtTime(bassNote, time);
                bassGain.gain.setValueAtTime(0.015, time); 
                bassGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.35);
                bassOsc.connect(bassGain);
                bassGain.connect(analyser);
                bassGain.connect(audioCtx.destination);
                bassOsc.start(time);
                bassOsc.stop(time + 0.35);

                if (beatStep % 2 === 0) {
                    let leadOsc = audioCtx.createOscillator();
                    let leadGain = audioCtx.createGain();
                    leadOsc.type = 'triangle';
                    leadOsc.frequency.setValueAtTime(leadNote, time);
                    leadGain.gain.setValueAtTime(0.12, time); 
                    leadGain.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
                    leadOsc.connect(leadGain);
                    leadGain.connect(analyser);
                    leadGain.connect(audioCtx.destination);
                    leadOsc.start(time);
                    leadOsc.stop(time + 0.25);
                }
                beatStep++;
            }, 160);
        }

        function stopMusicEngine() {
            if (melodyTimer) { clearInterval(melodyTimer); melodyTimer = null; }
            if (customAudio && !customAudio.paused) {
                let fadeVol = 1.0;
                let fadeInterval = setInterval(() => {
                    fadeVol -= 0.1;
                    if (fadeVol <= 0) {
                        clearInterval(fadeInterval);
                        customAudio.pause();
                        customAudio.currentTime = 0;
                        customAudio.volume = 1.0;
                    } else {
                        customAudio.volume = fadeVol;
                    }
                }, 100);
            }
        }

osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);

        function animateCoinCounting(targetCoins) {
            let currentDisplayCoins = 0;

            let countInterval = setInterval(() => {

        function playCoinRewardSong() {
if (!audioCtx) initAudio();
            if (!audioCtx) return;
            let now = audioCtx.currentTime;
            for (let i = 0; i < 6; i++) {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500 + i * 150, now + i * 0.05);
                gain.gain.setValueAtTime(0.04, now + i * 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.07);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + i * 0.05);
                osc.stop(now + i * 0.05 + 0.07);
            }
        }

        // ГЕНЕРАЦИЯ КОЛОНН С УЧЕТОМ УРОВНЕЙ ДО 1000 И АНИМАЦИЕЙ ВСПЛЫВАНИЯ
        function spawnObstacle() {
            let difficultyProgress = Math.min(score / 1000, 1.0); 

            let minGap = Math.max(160, 220 - difficultyProgress * 50);
            let maxGap = Math.max(190, 250 - difficultyProgress * 50);
            const gapHeight = Math.floor(Math.random() * (maxGap - minGap + 1)) + minGap;
            
            const safetyMargin = 60;
            const maxPos = canvas.height - safetyMargin - gapHeight;
            const minPos = safetyMargin;
            const gapY = Math.random() * (maxPos - minPos) + minPos;

            const widths = [32, 38, 46];
            const width = widths[Math.floor(Math.random() * widths.length)];

            obstacles.push({ 
                x: canvas.width + 60, 
                width: width, 
                topHeight: gapY, 
                bottomY: gapY + gapHeight, 
                bottomHeight: canvas.height - (gapY + gapHeight), 
                passed: false,
                spawnAnimProgress: 0 
            });
        }

        function getCurrentTheme() {
            return colorThemes.find(m => m.id === currentMapIndex) || colorThemes[0];
        }

        let lastTime = performance.now();

        function update(dt) {
            renderLivePreviews();

            let timeFactor = dt / (1000 / 60);
            if (timeFactor > 3) timeFactor = 3;

            if (goalTextAlpha > 0) {
                goalTextAlpha -= 0.008 * timeFactor; // Очень медленное и плавное исчезновение текста по центру
                if (goalTextAlpha < 0) goalTextAlpha = 0;
            }

            if (bassCircleIntro > 0) {
                bassCircleIntro -= 0.005 * timeFactor;
                if (bassCircleIntro < 0) bassCircleIntro = 0;
            }

            if (analyser && musicEnabled && ((useCustomMusic && !customAudio.paused) || !useCustomMusic)) {
                if (!dataArray) dataArray = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(dataArray);
                let bassSum = 0;
                for(let i = 0; i < 12; i++) bassSum += dataArray[i];
                let bassAvg = bassSum / 12;
                if (bassAvg > 50) {
                    let calculatedPulse = (bassAvg - 50) / 140;
                    bassPulse = Math.max(bassPulse, calculatedPulse);
                }
            }
if (bassPulse > 0) { 
                bassPulse -= 0.06 * timeFactor; 
                if (bassPulse < 0) bassPulse = 0; 
            }

            if (mainMenu.style.display !== 'none') {
                menuTitle.style.transform = `scale(${1 + bassPulse * 0.15})`;
            }

            stars.forEach(star => {
                star.x -= star.speed * (gameRunning ? (currentSpeed / baseSpeed) : 1) * timeFactor;
                if (star.x < 0) star.x = canvas.width;
                star.alpha += Math.sin(frameCount * star.twinkleSpeed) * 0.02 * timeFactor;
                if (star.alpha < 0.2) star.alpha = 0.2;
                if (star.alpha > 1) star.alpha = 1;
            });

            particles.forEach((p, index) => {
                if (p.vx !== undefined) {
                    p.x += p.vx * timeFactor;
                    p.y += p.vy * timeFactor;
                    p.alpha -= p.decay * timeFactor;
                } else {
                    p.x += p.speedX * timeFactor;
                    p.alpha -= 0.025 * timeFactor;
                }
                if (p.alpha <= 0) particles.splice(index, 1);
            });

            frameCount += timeFactor;
            
            if (isAutoPlay) {
                let prevY = player.y;
                player.targetY = canvas.height / 2 + Math.sin(frameCount / 25) * 80;
                player.y += (player.targetY - player.y) * (0.08 * timeFactor);
                
                let targetTilt = (player.y - prevY) * 0.04;
                player.currentTilt += (targetTilt - player.currentTilt) * (0.15 * timeFactor);

                if (Math.floor(frameCount) % 3 === 0) {
                    particles.push({ x: player.x - 20, y: player.y + (Math.random() * 14 - 7), size: Math.random() * 2.5 + 1.5, speedX: -3.5 - Math.random() * 1.5, alpha: 0.85, color: '#ffffff' });
                }
                return;
            }

            if (!gameRunning) return;

            let speedMultiplier = 1 + Math.min(score / 1000, 1.5);
            if (currentSpeed < maxSpeed * speedMultiplier) {
                currentSpeed += 0.0015 * timeFactor;
            }

            let prevY = player.y;
            player.y += (player.targetY - player.y) * (0.32 * timeFactor);
            if (player.y < player.radius) player.y = player.radius;
            if (player.y > canvas.height - player.radius) player.y = canvas.height - player.radius;

            let targetTilt = (player.y - prevY) * 0.05;
            if (targetTilt > 0.45) targetTilt = 0.45;
            if (targetTilt < -0.45) targetTilt = -0.45;
            player.currentTilt += (targetTilt - player.currentTilt) * (0.15 * timeFactor);

            let spawnRate = Math.max(50, Math.floor(90 - (currentSpeed * 4)));
            if (Math.floor(frameCount) % spawnRate === 0) spawnObstacle();

            if (Math.floor(frameCount) % 3 === 0) {
                particles.push({ x: player.x - 20, y: player.y + (Math.random() * 14 - 7), size: Math.random() * 2.5 + 1.5, speedX: -3.5 - Math.random() * 1.5, alpha: 0.85, color: '#ffffff' });
            }

            obstacles.forEach((obs, index) => {
                if (obs.spawnAnimProgress < 1) {
                    obs.spawnAnimProgress += 0.04 * timeFactor;
                    if (obs.spawnAnimProgress > 1) obs.spawnAnimProgress = 1;
                }

                obs.x -= currentSpeed * timeFactor;

                if (player.x + (player.radius - 5) > obs.x && player.x - (player.radius - 5) < obs.x + obs.width) {
                    if (player.y - (player.radius - 5) < obs.topHeight || player.y + (player.radius - 5) > obs.bottomY) gameOver();
                }

                if (!obs.passed && obs.x + obs.width < player.x) { 
                    obs.passed = true; 
                    score += 10; 
                    scoreVal.innerText = score; 
                    playScoreSound(); 

                    if (score >= 50 && !milestoneShownThisRun && congratsCount < 10) {
milestoneShownThisRun = true;
                        congratsCount++;
                        saveGameData();
                        showToast("МОЛОДЕЦ! 🚀 Отличный результат!", 2500);
                    }
                }
                if (obs.x + obs.width < -50) obstacles.splice(index, 1);
            });
        }

        function drawPerfectStraightObstacle(obs, isTop, theme) {
            let x = obs.x;
            let w = obs.width;
            
            let animScale = obs.spawnAnimProgress;
            let h = isTop ? (obs.topHeight * animScale) : (obs.bottomHeight * animScale);
            let y = isTop ? 0 : (canvas.height - h);

            ctx.save();
            ctx.shadowBlur = 18;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.85)';
            ctx.globalAlpha = animScale;

            ctx.fillStyle = theme.darkBlock;
            ctx.fillRect(x, y, w, h);

            ctx.strokeStyle = theme.obstacle;
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);

            ctx.fillStyle = theme.primary;
            ctx.shadowBlur = 10;
            ctx.shadowColor = theme.primary;
            ctx.globalAlpha = 0.9 * animScale;
            ctx.fillRect(x + w / 2 - 1.5, y + (isTop ? 15 : 0), 3, Math.max(0, h - 30));
            ctx.globalAlpha = 1.0 * animScale;

            ctx.strokeStyle = theme.primary;
            ctx.lineWidth = 1;
            let step = 26;
            let startOffset = (y % step);
            for (let currentY = y + startOffset; currentY < y + h; currentY += step) {
                if (currentY > y + 5 && currentY < y + h - 5) {
                    ctx.beginPath();
                    ctx.moveTo(x + 3, currentY);
                    ctx.lineTo(x + w - 3, currentY);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        function draw() {
            let theme = getCurrentTheme();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.strokeStyle = theme.primary;
            ctx.globalAlpha = 0.04 + bassPulse * 0.08;
            ctx.lineWidth = 1;

            let gridSpacing = 50;
            let gridOffsetX = (frameCount * (currentSpeed * 0.5)) % gridSpacing;

            for (let x = -gridOffsetX; x < canvas.width; x += gridSpacing) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSpacing) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
            ctx.restore();

            stars.forEach(star => {
                ctx.fillStyle = theme.primary;
                ctx.globalAlpha = star.alpha;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.save();
            let centerX = canvas.width / 2;
            let centerY = canvas.height / 2;
            let baseRadius = Math.min(canvas.width, canvas.height) * 0.44;
            let pulseOffset = bassPulse * 70;

            ctx.beginPath();
            ctx.arc(centerX, centerY, baseRadius + pulseOffset, 0, Math.PI * 2);

            if (bassCircleIntro > 0.01) {
                ctx.fillStyle = `rgba(255, 255, 255, ${bassCircleIntro * 0.85})`;
                ctx.fill();
            } else {
                ctx.fillStyle = theme.darkBlock;
                ctx.globalAlpha = 0.2 + bassPulse * 0.4;
                ctx.fill();
            }

            ctx.lineWidth = 3 + bassPulse * 10;
            ctx.strokeStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 18 + bassPulse * 40;
            ctx.globalAlpha = 0.25 + bassCircleIntro * 0.75 + bassPulse * 0.65;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(centerX, centerY, baseRadius + pulseOffset + 4, 0, Math.PI * 2);
ctx.strokeStyle = theme.primary;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.3 + bassPulse * 0.5;
            ctx.stroke();

            ctx.save();
            ctx.translate(centerX, centerY);
            let textScale = 1 + bassPulse * 0.18;
            ctx.scale(textScale, textScale);
            ctx.font = `900 ${Math.min(canvas.width, canvas.height) * 0.12}px 'Segoe UI', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = theme.primary;
            ctx.globalAlpha = 0.03 + bassPulse * 0.15;
            ctx.fillText("HOMUTY", 0, 0);
            ctx.restore();
            ctx.restore();

            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            });

            if (!isAutoPlay) {
                obstacles.forEach(obs => {
                    drawPerfectStraightObstacle(obs, true, theme);
                    drawPerfectStraightObstacle(obs, false, theme);
                });

                // ОГРОМНЫЙ КРАСИВЫЙ ГРАДИЕНТНЫЙ ТЕКСТ ПО СЕРЕДИНЕ (ЦЕЛЬ ИГРЫ), ПЛАВНО ИСЧЕЗАЮЩИЙ
                if (goalTextAlpha > 0) {
                    ctx.save();
                    ctx.font = '900 34px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    let grad = ctx.createLinearGradient(canvas.width/2 - 250, canvas.height/2, canvas.width/2 + 250, canvas.height/2);
                    grad.addColorStop(0, '#38bdf8');
                    grad.addColorStop(0.5, '#c084fc');
                    grad.addColorStop(1, '#ec4899');
                    
                    ctx.fillStyle = grad;
                    ctx.shadowColor = '#ec4899';
                    ctx.shadowBlur = 25;
                    ctx.globalAlpha = Math.min(1.0, goalTextAlpha);
                    ctx.fillText("ГЛАВНАЯ ЦЕЛЬ: НАБРАТЬ БОЛЬШЕ ОЧКОВ!", canvas.width / 2, canvas.height / 2);
                    ctx.restore();
                }
            }

            if (gameRunning || isAutoPlay) {
                ctx.save();
                ctx.translate(player.x, player.y);
                
                ctx.shadowBlur = 25;
                ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';

                let primaryColor = theme.primary;
                if (currentSkin === 'rainbow') primaryColor = `hsl(${(frameCount * 4) % 360}, 90%, 60%)`;
                else if (currentSkin === 'gold') primaryColor = '#ffd700';
                else if (currentSkin === 'void') primaryColor = '#a855f7';
                else if (currentSkin === 'plasma') primaryColor = '#00ffff';
                else if (currentSkin === 'cal_mega_king') primaryColor = '#ff00ea';

                let playerScale = 1 + bassPulse * 0.18;
                ctx.scale(playerScale, playerScale);

                drawPenguinInPlane(ctx, currentSkin, frameCount, primaryColor, player.currentTilt);

                ctx.restore();
            }
        }

        function gameLoop(timestamp) {
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            if (!dt || dt > 200) dt = 16.66;

            update(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        resizeCanvas();
        requestAnimationFrame(gameLoop);
    </script>
</body>
